version: '3.8'

services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/bildyapp
      - JWT_ACCESS_SECRET=dev-secret-32-characters-long!!
      - JWT_REFRESH_SECRET=dev-refresh-secret-32-chars!!
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
